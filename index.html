/* =========================================================

   TOAST NOTIFICATIONS (badala ya alert())

========================================================= */

function showToast(message, type = "info", ms = 3200) {

  const wrap = document.getElementById("toastWrap");

  if (!wrap) return;

  const el = document.createElement("div");

  el.className = `toast ${type}`;

  const glyph = type === "success" ? ICONS.check : type === "error" ? ICONS.warn : ICONS.bell;

  el.innerHTML = `<span class="icon" style="width:16px;height:16px">${glyph}</span><span>${escapeHtml(message)}</span>`;

  wrap.appendChild(el);

  setTimeout(() => {

    el.classList.add("leaving");

    setTimeout(() => el.remove(), 220);

  }, ms);

}

      </div>`;

    document.body.appendChild(overlay);

    const cleanup = (val) => { overlay.remove(); resolve(val); };

    overlay.querySelector("#confirmNo").onclick = () => cleanup(false);

    overlay.querySelector("#confirmYes").onclick = () => cleanup(true);

    overlay.onclick = (e) => { if (e.target === overlay) cleanup(false); };

  });

}



/* =========================================================

function fireConfetti() {

  const canvas = document.getElementById("confettiCanvas");

  if (!canvas) return;

  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth; canvas.height = window.innerHeight;

  const colors = ["#D9A441","#F0C777","#4C7A5A","#B4553A","#F6F1E7"];

  const pieces = Array.from({length: 90}, () => ({

    x: Math.random()*canvas.width, y: -20 - Math.random()*canvas.height*0.3,

    r: 4 + Math.random()*5, c: colors[Math.floor(Math.random()*colors.length)],

    vy: 2 + Math.random()*3, vx: -1.5 + Math.random()*3, rot: Math.random()*360, vr: -6 + Math.random()*12

  }));

  let frame = 0;

  function tick() {

    frame++;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p => {

      p.x += p.vx; p.y += p.vy; p.rot += p.vr;

      ctx.save();

      ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);

      ctx.fillStyle = p.c;

      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*0.6);

      ctx.restore();

    });

    if (frame < 130) requestAnimationFrame(tick);

    else ctx.clearRect(0,0,canvas.width,canvas.height);

  }

  tick();

}

  clearListeners();

  if (user) {

    CURRENT_USER = user;

    const doc = await db.collection("users").doc(user.uid).get();

    if (doc.exists) {

      PROFILE = doc.data();

      renderDashboard();

    } else {

      renderAuthScreen();

    }

  } else {

    CURRENT_USER = null;

    PROFILE = null;

    renderAuthScreen();

  }

});

async function doLogin() {

  const email = document.getElementById("loginEmail").value.trim();

  const pass = document.getElementById("loginPass").value;

  const msg = document.getElementById("authMsg");

  if (!email || !pass) { msg.textContent = "Jaza barua pepe na nywila."; msg.className="text-sm mt-4 text-center text-[#D97757]"; return; }

  msg.textContent = "Inaingia...";

  msg.className = "text-sm mt-4 text-center text-[#9fb0c7]";

  try {

    await auth.signInWithEmailAndPassword(email, pass);

  } catch (e) {

    msg.textContent = friendlyAuthError(e);

    msg.className = "text-sm mt-4 text-center text-[#D97757]";

async function doSignup() {

  const name = document.getElementById("suName").value.trim();

  const email = document.getElementById("suEmail").value.trim();

  const pass = document.getElementById("suPass").value;

  const pin = document.getElementById("suPin").value.trim().toUpperCase();

  const msg = document.getElementById("authMsg");



  if (!name || !email || !pass) { msg.textContent = "Jaza sehemu zote muhimu."; msg.className="text-sm mt-4 text-center text-[#D97757]"; return; }

  if (pass.length < 6) { msg.textContent = "Nywila iwe angalau herufi 6."; msg.className="text-sm mt-4 text-center text-[#D97757]"; return; }



  let role = "Mwanachama";

  if (pin) {

    if (ROLE_PINS[pin]) { role = ROLE_PINS[pin]; }

    else { msg.textContent = "PIN ya uongozi si sahihi."; msg.className="text-sm mt-4 text-center text-[#D97757]"; return; }

  }



  msg.textContent = "Inaunda akaunti...";

  msg.className = "text-sm mt-4 text-center text-[#9fb0c7]";

  try {

    const cred = await auth.createUserWithEmailAndPassword(email, pass);

    await db.collection("users").doc(cred.user.uid).set({

      name, email, role,

      photoURL: "",

      securityPin: "",

      createdAt: firebase.firestore.FieldValue.serverTimestamp()

    });

    JUST_SIGNED_UP = true;

  } catch (e) {

    msg.textContent = friendlyAuthError(e);

    msg.className = "text-sm mt-4 text-center text-[#D97757]";

  }

}



function friendlyAuthError(e) {

  const code = e.code || "";

  if (code.includes("email-already-in-use")) return "Barua pepe hii tayari imesajiliwa.";

  if (code.includes("invalid-email")) return "Barua pepe si sahihi.";

  if (code.includes("wrong-password") || code.includes("invalid-credential")) return "Nywila au barua pepe si sahihi.";

  if (code.includes("user-not-found")) return "Akaunti haipo. Jisajili kwanza.";

  if (code.includes("weak-password")) return "Nywila ni dhaifu, weka angalau herufi 6.";

  return "Hitilafu imetokea. Jaribu tena.";

}

function showKatibaModal() {
  const overlay = document.createElement("div");
  overlay.id = "katibaOverlay";
  overlay.className = "fixed inset-0 z-[110] flex items-center justify-center p-4";
  overlay.style.background = "rgba(5,9,16,0.7)";
  overlay.style.backdropFilter = "blur(2px)";
  overlay.innerHTML = `
    <div class="glass rounded-2xl p-6 w-full max-w-2xl max-h-[85vh] flex flex-col fade-in">
      <div class="flex items-center justify-between mb-4 shrink-0">
        <div class="flex items-center gap-2">
          ${icon('katiba')}
          <h3 class="font-display text-lg font-semibold">Katiba ya Ukoo</h3>
        </div>
        <button id="katibaCloseBtn" class="text-[#9fb0c7] hover:text-white">${icon('close')}</button>
      </div>
      <div id="katibaBody" class="overflow-y-auto flex-1 space-y-3">
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-5/6"></div>
        <div class="skeleton h-4 w-2/3"></div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector("#katibaCloseBtn").onclick = () => overlay.remove();

  const isChair = PROFILE.role === "Mwenyekiti";
  db.collection("settings").doc("katiba").get().then(doc => {
    const data = doc.exists ? doc.data() : { content: "" };
    const body = overlay.querySelector("#katibaBody");
    if (!body) return;
    renderView(data.content || "", data.updatedByName, data.updatedAt);

    function renderView(content, updatedByName, updatedAt) {
      body.innerHTML = `
        ${content ? `<div class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</div>`
                   : `<p class="text-[#63769a] text-sm">Katiba ya ukoo bado haijawekwa.</p>`}
        ${updatedByName ? `<p class="text-[10px] text-[#63769a] mt-4 pt-3 border-t hairline">Ilisasishwa mara ya mwisho na ${escapeHtml(updatedByName)}${updatedAt ? " · " + updatedAt.toDate().toLocaleDateString('sw-TZ') : ""}</p>` : ""}
        ${isChair ? `<button id="katibaEditBtn" class="mt-4 flex items-center gap-2 text-sm px-4 py-2 rounded-lg btn-ghost">${icon('edit','icon w-4 h-4')} Hariri Katiba</button>` : ""}
      `;
      if (isChair) {
        body.querySelector("#katibaEditBtn").onclick = () => renderEdit(content);
      }
    }

    function renderEdit(content) {
      body.innerHTML = `
        <textarea id="katibaTextarea" class="input-field w-full px-4 py-3 text-sm" rows="14">${content}</textarea>
        <div class="flex justify-end gap-3 mt-3">
          <button id="katibaCancelBtn" class="btn-ghost px-4 py-2 rounded-lg text-sm">Ghairi</button>
          <button id="katibaSaveBtn" class="btn-gold px-4 py-2 rounded-lg text-sm">Hifadhi Katiba</button>
        </div>
      `;
      body.querySelector("#katibaCancelBtn").onclick = () => renderView(content, data.updatedByName, data.updatedAt);
      body.querySelector("#katibaSaveBtn").onclick = async () => {
        const newContent = body.querySelector("#katibaTextarea").value;
        await db.collection("settings").doc("katiba").set({
          content: newContent, updatedByName: PROFILE.name,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        showToast("Katiba imehifadhiwa.","success");
        overlay.remove();
      };
    }
  }).catch(() => {
    const body = overlay.querySelector("#katibaBody");
    if (body) body.innerHTML = `<p class="text-[#B4553A] text-sm">Imeshindikana kupakia katiba. Jaribu tena.</p>`;
  });
}

========================================================= */

function listenAlerts() {

  const unsub = db.collection("announcements").orderBy("createdAt", "desc").limit(1)

    .onSnapshot(snap => {

      const banner = document.getElementById("alertBanner");

      if (!banner) return;

      if (snap.empty) { banner.innerHTML = ""; return; }

      const a = snap.docs[0].data();

      const aId = snap.docs[0].id;

      const ageMs = a.createdAt ? Date.now() - a.createdAt.toDate().getTime() : 0;

      if (ageMs > 1000 * 60 * 60 * 24) { banner.innerHTML = ""; return; } // hide after 24h

      banner.innerHTML = `

        <div class="bg-[#B4553A] text-white px-4 md:px-8 py-3 flex items-center gap-3 fade-in">

          <span class="pulse-dot text-lg">●</span>

          <p class="text-sm font-medium flex-1">${escapeHtml(a.message)}</p>

          ${PROFILE.role === "Mwenyekiti" ? `<button id="delAnnounceBtn" class="text-xs underline opacity-90">Futa</button>` : ""}

        </div>`;

      const delBtn = document.getElementById("delAnnounceBtn");

      if (delBtn) delBtn.onclick = () => db.collection("announcements").doc(aId).delete();

    });

  UNSUBS.push(unsub);

}

        ${m.agenda ? `<p class="text-sm text-[#9fb0c7] mb-3">Ajenda: ${escapeHtml(m.agenda)}</p>` : ""}

        <a href="${m.link || '#'}" target="_blank" class="btn-gold inline-block px-5 py-2.5 rounded-lg text-sm">Jiunge na Kikao</a>

      `;

    } else {

      card.innerHTML = `<p class="text-sm text-[#9fb0c7]"><span class="opacity-60">○</span> Hakuna kikao kinachoendelea. Subiri tangazo la Katibu au Mwenyekiti.</p>`;

    }

  });

  UNSUBS.push(unsub);



  const unsubMin = db.collection("minutes").orderBy("createdAt","desc").limit(10).onSnapshot(snap => {

    const list = document.getElementById("minutesList");

    if (!list) return;

    if (snap.empty) { list.innerHTML = `<p class="text-[#63769a] text-sm">Bado hakuna muhtasari uliohifadhiwa.</p>`; return; }

    list.innerHTML = snap.docs.map(d => {

      const m = d.data();

      const date = m.createdAt ? m.createdAt.toDate().toLocaleDateString('sw-TZ') : "";

      return `<div class="border-b hairline pb-3">

        <div class="flex items-center justify-between gap-2">

          <p class="text-xs text-[#63769a] mb-1">${date}</p>

          ${canManage ? `<button data-delmin="${d.id}" class="text-[10px] text-[#B4553A] hover:underline">Futa</button>` : ""}

        </div>

        <p>${escapeHtml(m.text)}</p>

      </div>`;

    }).join("");

    if (canManage) {

      list.querySelectorAll("[data-delmin]").forEach(b => {

        b.onclick = async () => { if (await showConfirm("Futa muhtasari huu?")) { await db.collection("minutes").doc(b.dataset.delmin).delete(); showToast("Muhtasari umefutwa.","success"); } };

      });

    }

  });

  UNSUBS.push(unsubMin);



  if (canManage) {

    document.getElementById("startMeetBtn").onclick = async () => {

      const link = document.getElementById("meetLink").value.trim();

      const agenda = document.getElementById("meetAgenda").value.trim();

      if (!link) { showToast("Weka link ya kikao kwanza.","error"); return; }

      await db.collection("meetings").doc("current").set({

        active: true, link, agenda,

        startedBy: PROFILE.name, startedAt: firebase.firestore.FieldValue.serverTimestamp()

      });

      showToast("Kikao kimeanzishwa.","success");

    };

    document.getElementById("endMeetBtn").onclick = async () => {

      await db.collection("meetings").doc("current").set({ active: false }, { merge: true });

      showToast("Kikao kimefungwa.","info");

    };

    document.getElementById("saveMinuteBtn").onclick = async () => {

      const text = document.getElementById("newMinute").value.trim();

      if (!text) return;

      await db.collection("minutes").add({

        text, author: PROFILE.name, createdAt: firebase.firestore.FieldValue.serverTimestamp()

      });

      document.getElementById("newMinute").value = "";

      showToast("Muhtasari umehifadhiwa.","success");

    };

  }

}



/* =========================================================

   FEDHA (Finance)

========================================================= */

function renderFedha() {

  const main = document.getElementById("mainContent");

  const isMhazini = PROFILE.role === "Mhazini";

  main.innerHTML = `<div class="fade-in space-y-6 max-w-4xl">

    <div class="flex items-center justify-between flex-wrap gap-3">

      <div>

        <h2 class="font-display text-2xl font-semibold">Fedha za Ukoo</h2>

        <p class="text-[#9fb0c7] text-sm mt-1">Mfuko mkuu, michango na matumizi.</p>

      </div>

      <div class="glass rounded-xl px-5 py-3 text-right">

        <p class="text-xs text-[#9fb0c7]">Salio la Mfuko</p>

        <p id="fundBalance" class="font-display text-2xl font-semibold">...</p>

      </div>

    </div>



    <div class="glass rounded-2xl p-5">

      <h3 class="font-semibold text-sm text-[#9fb0c7] mb-3">Mwenendo wa Fedha (Miezi 6)</h3>

      <div style="height:220px"><canvas id="fedhaChart"></canvas></div>

    </div>



    <div class="glass rounded-2xl p-5 space-y-3">

      <h3 class="font-semibold text-sm text-[#9fb0c7]">Tuma Muamala</h3>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">

        <select id="txType" class="input-field px-3 py-2.5 text-sm">

          <option value="mchango">Mchango (Pesa Inaingia)</option>

          <option value="matumizi">Matumizi (Pesa Inatoka)</option>

        </select>

        <input id="txAmount" type="number" placeholder="Kiasi (TSh)" class="input-field px-3 py-2.5 text-sm">

        <input id="txDesc" type="text" placeholder="Maelezo" class="input-field px-3 py-2.5 text-sm">

      </div>

      <button id="txSubmitBtn" class="btn-gold px-4 py-2 rounded-lg text-sm">Tuma kwa Uhakiki</button>

    </div>



    ${isMhazini ? `

    <div class="glass rounded-2xl p-5">

      <div class="flex items-center justify-between mb-3">

        <h3 class="font-semibold text-sm text-[#9fb0c7]">Miamala Inayosubiri Uhakiki (Mhazini)</h3>

        <button id="clearTxBtn" class="text-xs text-[#B4553A] hover:underline">Futa Rekodi Zote</button>

      </div>

      <div id="pendingTxList" class="space-y-2"></div>

    </div>` : ""}



    <div class="glass rounded-2xl p-5">

      <h3 class="font-semibold text-sm text-[#9fb0c7] mb-3">Historia ya Miamala</h3>

      <div id="allTxList" class="space-y-2 text-sm"></div>

    </div>

  </div>`;



  document.getElementById("txSubmitBtn").onclick = async () => {

    const type = document.getElementById("txType").value;

    const amount = Number(document.getElementById("txAmount").value);

    const desc = document.getElementById("txDesc").value.trim();

    if (!amount || amount <= 0) { showToast("Weka kiasi sahihi.","error"); return; }

    await db.collection("transactions").add({

      type, amount, description: desc,

      submittedBy: CURRENT_USER.uid, submittedByName: PROFILE.name,

      status: "pending",

      createdAt: firebase.firestore.FieldValue.serverTimestamp()

    });

    document.getElementById("txAmount").value = "";

    document.getElementById("txDesc").value = "";

    showToast("Muamala umetumwa kwa uhakiki.","success");

  };



  let fedhaChartInstance = null;

  const unsubChart = db.collection("transactions").where("status","==","approved")

    .orderBy("createdAt","asc").onSnapshot(snap => {

      const canvas = document.getElementById("fedhaChart");

      if (!canvas || typeof Chart === "undefined") return;

      const buckets = {};

      const now = new Date();

      for (let i = 5; i >= 0; i--) {

        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);

        buckets[`${d.getFullYear()}-${d.getMonth()}`] = { label: d.toLocaleDateString('sw-TZ',{month:'short'}), mchango:0, matumizi:0 };

      }

      snap.forEach(doc => {

        const t = doc.data();

        if (!t.createdAt) return;

        const d = t.createdAt.toDate();

        const key = `${d.getFullYear()}-${d.getMonth()}`;

        if (buckets[key]) buckets[key][t.type === 'mchango' ? 'mchango' : 'matumizi'] += Number(t.amount||0);

      });

      const labels = Object.values(buckets).map(b => b.label);

      const mchango = Object.values(buckets).map(b => b.mchango);

      const matumizi = Object.values(buckets).map(b => b.matumizi);

      if (fedhaChartInstance) fedhaChartInstance.destroy();

      fedhaChartInstance = new Chart(canvas.getContext("2d"), {

        type: "bar",

        data: { labels, datasets: [

          { label: "Michango", data: mchango, backgroundColor: "#D9A441", borderRadius: 6 },

          { label: "Matumizi", data: matumizi, backgroundColor: "#B4553A", borderRadius: 6 },

        ]},

        options: {

          responsive: true, maintainAspectRatio: false,

          plugins: { legend: { labels: { color: "#9fb0c7", font: { size: 11 } } } },

          scales: {

            x: { ticks: { color: "#9fb0c7" }, grid: { display: false } },

            y: { ticks: { color: "#9fb0c7" }, grid: { color: "rgba(255,255,255,0.06)" } }

          }

        }

      });

    });

  UNSUBS.push(unsubChart);



  const unsubBal = db.collection("transactions").where("status","==","approved").onSnapshot(snap => {

    let total = 0;

    snap.forEach(d => {

      const t = d.data();

      total += t.type === "mchango" ? Number(t.amount||0) : -Number(t.amount||0);

    });

    const el = document.getElementById("fundBalance");

    if (el) el.textContent = "TSh " + total.toLocaleString();

  });

  UNSUBS.push(unsubBal);



  if (isMhazini) {

    const unsubPending = db.collection("transactions").where("status","==","pending")

      .orderBy("createdAt","desc").onSnapshot(snap => {

        const list = document.getElementById("pendingTxList");

        if (!list) return;

        if (snap.empty) { list.innerHTML = `<p class="text-[#63769a] text-sm">Hakuna miamala inayosubiri.</p>`; return; }

        list.innerHTML = snap.docs.map(d => {

          const t = d.data();

          return `<div class="flex items-center justify-between border-b hairline pb-2 gap-2 flex-wrap">

            <div>

              <p class="text-sm">${t.type === 'mchango' ? icon('up','icon w-3.5 h-3.5 inline text-[#4C7A5A]') : icon('down','icon w-3.5 h-3.5 inline text-[#B4553A]')} TSh ${Number(t.amount).toLocaleString()} � ${escapeHtml(t.description||'')}</p>

              <p class="text-xs text-[#63769a]">${escapeHtml(t.submittedByName)}</p>

            </div>

            <div class="flex gap-2">

              <button data-approve="${d.id}" class="btn-gold text-xs px-3 py-1.5 rounded-lg">Idhinisha</button>

              <button data-reject="${d.id}" class="btn-ghost text-xs px-3 py-1.5 rounded-lg">Kataa</button>

            </div>

          </div>`;

        }).join("");

        list.querySelectorAll("[data-approve]").forEach(b => {

          b.onclick = async () => { await db.collection("transactions").doc(b.dataset.approve).update({ status:"approved", approvedBy: PROFILE.name }); showToast("Muamala umeidhinishwa.","success"); };

        });

        list.querySelectorAll("[data-reject]").forEach(b => {

          b.onclick = async () => { await db.collection("transactions").doc(b.dataset.reject).update({ status:"rejected", approvedBy: PROFILE.name }); showToast("Muamala umekataliwa.","info"); };

        });

      });

    UNSUBS.push(unsubPending);



    document.getElementById("clearTxBtn").onclick = async () => {

      if (!await showConfirm("Una uhakika unataka kufuta rekodi ZOTE za miamala? Hatua hii haiwezi kurudishwa.")) return;

      const snap = await db.collection("transactions").get();

      const batchArr = snap.docs;

      for (const d of batchArr) { await d.ref.delete(); }

      showToast("Rekodi za miamala zimefutwa.","success");

    };

  }



  const unsubAll = db.collection("transactions").orderBy("createdAt","desc").limit(30).onSnapshot(snap => {

    const list = document.getElementById("allTxList");

    if (!list) return;

    if (snap.empty) { list.innerHTML = `<p class="text-[#63769a] text-sm">Bado hakuna miamala.</p>`; return; }

    list.innerHTML = snap.docs.map(d => {

      const t = d.data();

      const statusColor = t.status === "approved" ? "#4C7A5A" : t.status === "rejected" ? "#B4553A" : "#D9A441";

      const statusLabel = t.status === "approved" ? "Imeidhinishwa" : t.status === "rejected" ? "Imekataliwa" : "Inasubiri";

      return `<div class="flex items-center justify-between border-b hairline pb-2 gap-2 flex-wrap">

        <div>

          <p>${t.type === 'mchango' ? icon('up','icon w-3.5 h-3.5 inline text-[#4C7A5A]') : icon('down','icon w-3.5 h-3.5 inline text-[#B4553A]')} TSh ${Number(t.amount).toLocaleString()} � ${escapeHtml(t.description||'')}</p>

          <p class="text-xs text-[#63769a]">${escapeHtml(t.submittedByName)}</p>

        </div>

        <div class="flex items-center gap-2">

          <span class="badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}55">${statusLabel}</span>

          ${isMhazini ? `<button data-deltx="${d.id}" class="text-[10px] text-[#B4553A] hover:underline">Futa</button>` : ""}

        </div>

      </div>`;

    }).join("");

    if (isMhazini) {

      list.querySelectorAll("[data-deltx]").forEach(b => {

        b.onclick = async () => { if (await showConfirm("Futa muamala huu?")) { await db.collection("transactions").doc(b.dataset.deltx).delete(); showToast("Muamala umefutwa.","success"); } };

      });

    }

  });

  UNSUBS.push(unsubAll);

}

function renderSOS() {

  const main = document.getElementById("mainContent");

  main.innerHTML = `<div class="fade-in space-y-6 max-w-3xl">

    <div>

      <h2 class="font-display text-2xl font-semibold">SOS &mdash; Shida Kubwa</h2>

      <p class="text-[#9fb0c7] text-sm mt-1">Ripoti dharura au shida binafsi. Uongozi utaona mara moja.</p>

    <div class="glass rounded-2xl p-5 space-y-3">

      <textarea id="sosMsg" placeholder="Eleza shida yako kwa ufupi..." class="input-field w-full px-4 py-2.5 text-sm" rows="3"></textarea>

    </div>



    <div class="glass rounded-2xl p-5">

      <h3 class="font-semibold text-sm text-[#9fb0c7] mb-3">${isLeader() ? "Ripoti Zote" : "Ripoti Zangu"}</h3>

      <div id="sosList" class="space-y-3"></div>

  </div>`;



  document.getElementById("sosSendBtn").onclick = async () => {

    const message = document.getElementById("sosMsg").value.trim();

    if (!message) return;

    await db.collection("sos").add({

      message, userId: CURRENT_USER.uid, userName: PROFILE.name,

      status: "wazi", createdAt: firebase.firestore.FieldValue.serverTimestamp()

    });

    document.getElementById("sosMsg").value = "";

    showToast("Ripoti ya SOS imetumwa kwa uongozi.","success");

  };



  let query = db.collection("sos").orderBy("createdAt","desc");

  if (!isLeader()) query = db.collection("sos").where("userId","==",CURRENT_USER.uid).orderBy("createdAt","desc");



  const unsub = query.onSnapshot(snap => {

    const list = document.getElementById("sosList");

    if (!list) return;

    if (snap.empty) { list.innerHTML = `<p class="text-[#63769a] text-sm">Hakuna ripoti kwa sasa.</p>`; return; }

    list.innerHTML = snap.docs.map(d => {

      const s = d.data();

      const date = s.createdAt ? s.createdAt.toDate().toLocaleString('sw-TZ') : "";

      const open = s.status === "wazi";

      return `<div class="border-b hairline pb-3">

        <div class="flex items-center justify-between gap-2 flex-wrap">

          <p class="text-sm font-medium">${escapeHtml(s.userName)}</p>

          <span class="badge" style="background:${open ? '#B4553A22' : '#4C7A5A22'};color:${open ? '#B4553A' : '#4C7A5A'};border:1px solid ${open ? '#B4553A55' : '#4C7A5A55'}">${open ? 'Wazi' : 'Imetatuliwa'}</span>

        </div>

        <p class="text-sm mt-1">${escapeHtml(s.message)}</p>

        <p class="text-xs text-[#63769a] mt-1">${date}</p>

        <div class="flex gap-2 mt-2">

          ${isLeader() && open ? `<button data-resolve="${d.id}" class="btn-ghost text-xs px-3 py-1.5 rounded-lg">Weka Imetatuliwa</button>` : ""}

          ${isLeader() ? `<button data-delsos="${d.id}" class="text-xs text-[#B4553A] hover:underline px-1">Futa</button>` : ""}

        </div>

      </div>`;

    }).join("");

    if (isLeader()) {

      list.querySelectorAll("[data-resolve]").forEach(b => {

        b.onclick = () => db.collection("sos").doc(b.dataset.resolve).update({ status: "imetatuliwa" });

      });

      list.querySelectorAll("[data-delsos]").forEach(b => {

        b.onclick = async () => { if (await showConfirm("Futa ripoti hii ya SOS?")) { await db.collection("sos").doc(b.dataset.delsos).delete(); showToast("Ripoti imefutwa.","success"); } };

      });

    }

  });

  UNSUBS.push(unsub);

}



/* =========================================================

   GROUP CHAT

========================================================= */

function renderChat() {

  const main = document.getElementById("mainContent");

  main.innerHTML = `<div class="fade-in h-full flex flex-col max-w-3xl">

    <div class="mb-4">

      <h2 class="font-display text-2xl font-semibold">Mazungumzo ya Familia</h2>

      <p class="text-[#9fb0c7] text-sm mt-1">Chati ya moja kwa moja kati ya wanachama wote.</p>

    </div>

    <div id="chatMessages" class="glass rounded-2xl p-4 flex-1 overflow-y-auto space-y-3 mb-3" style="min-height:340px;max-height:52vh"></div>

    <div class="flex gap-2">

      <input id="chatInput" type="text" placeholder="Andika ujumbe..." class="input-field flex-1 px-4 py-2.5 text-sm">

      <button id="chatSendBtn" class="btn-gold px-5 py-2.5 rounded-lg text-sm">Tuma</button>

    </div>

  </div>`;



  const send = async () => {

    const input = document.getElementById("chatInput");

    const message = input.value.trim();

    if (!message) return;

    input.value = "";

    await db.collection("chat").add({

      message, userId: CURRENT_USER.uid, userName: PROFILE.name,

      photoURL: PROFILE.photoURL || "",

      createdAt: firebase.firestore.FieldValue.serverTimestamp()

    });

  };

  document.getElementById("chatSendBtn").onclick = send;

  document.getElementById("chatInput").onkeydown = (e) => { if (e.key === "Enter") send(); };



  const unsub = db.collection("chat").orderBy("createdAt","desc").limit(50).onSnapshot(snap => {

    const box = document.getElementById("chatMessages");

    if (!box) return;

    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse();

    const canDeleteAny = isLeader();

    box.innerHTML = msgs.map(m => {

      const mine = m.userId === CURRENT_USER.uid;

      const canDelete = mine || canDeleteAny;

      return `<div class="flex ${mine ? 'justify-end' : 'justify-start'} group">

        <div class="max-w-[80%]">

          <div class="${mine ? 'bg-[#D9A441] text-[#241705]' : 'bg-white/10 text-[#F6F1E7]'} rounded-2xl px-4 py-2">

            ${!mine ? `<p class="text-xs font-semibold mb-0.5" style="color:${ROLE_COLORS[PROFILE.role] || '#D9A441'}">${escapeHtml(m.userName)}</p>` : ""}

            <p class="text-sm">${escapeHtml(m.message)}</p>

          </div>

          ${canDelete ? `<button data-delmsg="${m.id}" class="text-[10px] text-[#63769a] hover:text-[#B4553A] mt-0.5 ${mine ? 'float-right' : ''}">Futa</button>` : ""}

        </div>

      </div>`;

    }).join("");

    box.scrollTop = box.scrollHeight;

    box.querySelectorAll("[data-delmsg]").forEach(b => {

      b.onclick = () => db.collection("chat").doc(b.dataset.delmsg).delete();

    });

  });

  UNSUBS.push(unsub);

}



/* =========================================================

   KURASA ZETU (Dynamic sections)

========================================================= */

function renderKurasa() {

  const main = document.getElementById("mainContent");

  main.innerHTML = `<div class="fade-in space-y-6 max-w-3xl">

    <div>

      <h2 class="font-display text-2xl font-semibold">Kurasa Zetu</h2>

      <p class="text-[#9fb0c7] text-sm mt-1">Kurasa maalum zilizotengenezwa na uongozi.</p>

    </div>



    ${isLeader() ? `

    <div class="glass rounded-2xl p-5 space-y-3">

      <h3 class="font-semibold text-sm text-[#9fb0c7]">Unda Ukurasa Mpya</h3>

      <input id="secTitle" type="text" placeholder="Kichwa cha ukurasa" class="input-field w-full px-4 py-2.5 text-sm">

      <textarea id="secContent" placeholder="Maudhui..." class="input-field w-full px-4 py-2.5 text-sm" rows="3"></textarea>

      <button id="secSaveBtn" class="btn-gold px-4 py-2 rounded-lg text-sm">Chapisha Ukurasa</button>

    </div>` : ""}



    <div id="secList" class="space-y-3"></div>

  </div>`;



  if (isLeader()) {

    document.getElementById("secSaveBtn").onclick = async () => {

      const title = document.getElementById("secTitle").value.trim();

      const content = document.getElementById("secContent").value.trim();

      if (!title) { showToast("Weka kichwa cha ukurasa.","error"); return; }

      await db.collection("sections").add({

        title, content, createdBy: PROFILE.name, createdAt: firebase.firestore.FieldValue.serverTimestamp()

      });

      document.getElementById("secContent").value = "";

      showToast("Ukurasa umechapishwa.","success");

    };

    const title = document.getElementById("kmbTitle").value.trim();
    const content = document.getElementById("kmbContent").value.trim();
    const msg = document.getElementById("kmbMsg");
    if (!title || !content) { msg.textContent = "Jaza kichwa na maelezo."; msg.className = "text-xs text-[#D97757]"; return; }
    try {

        title, content, authorName: PROFILE.name, authorId: CURRENT_USER.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById("kmbTitle").value = "";

      console.error("Kumbukumbu save error:", err);
      let hint = "Imeshindikana kuhifadhi kumbukumbu.";
      if (err && err.code === "permission-denied") hint = "Huna ruhusa ya kuhifadhi (angalia Firestore Rules).";
      else if (err && err.message) hint = "Imeshindikana: " + err.message;
      msg.textContent = hint;
      msg.className = "text-xs text-[#D97757]";
      showToast(hint,"error",5000);

  UNSUBS.push(unsub);
}

function renderNasaba() {

  const main = document.getElementById("mainContent");

    <div>

      <h2 class="font-display text-2xl font-semibold">Mti wa Ukoo</h2>

      <p class="text-[#9fb0c7] text-sm mt-1">Muunganiko wa vizazi vya ukoo wetu.</p>

    </div>



    <div class="glass rounded-2xl p-5 space-y-3">

      <h3 class="font-semibold text-sm text-[#9fb0c7]">Mzazi Wangu wa Ukoo</h3>

      <p class="text-xs text-[#9fb0c7]">Chagua mwanachama anayekuunganisha wewe kwenye ukoo (hiari).</p>

      <div class="flex flex-wrap gap-3">

        <select id="parentSelect" class="input-field px-3 py-2.5 text-sm flex-1 min-w-[180px]"><option value="">— Hakuna / Kizazi cha Kwanza —</option></select>

        <button id="parentSaveBtn" class="btn-gold px-4 py-2 rounded-lg text-sm">Hifadhi</button>

      </div>

    </div>



    <div class="glass rounded-2xl p-5">

      <h3 class="font-semibold text-sm text-[#9fb0c7] mb-4">Muundo wa Ukoo</h3>

      <div id="treeWrap" class="space-y-2">

        <div class="skeleton h-5 w-1/3 mb-3"></div>

        <div class="skeleton h-5 w-1/2 ml-6"></div>

      </div>

    </div>

  </div>`;



  const unsub = db.collection("users").onSnapshot(snap => {

    const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));



    const sel = document.getElementById("parentSelect");

    if (sel) {

      const current = PROFILE.parentId || "";

      sel.innerHTML = `<option value="">— Hakuna / Kizazi cha Kwanza —</option>` + users

        .filter(u => u.id !== CURRENT_USER.uid)

        .map(u => `<option value="${u.id}" ${u.id === current ? "selected" : ""}>${escapeHtml(u.name)}</option>`).join("");

    }



    const byId = {}; users.forEach(u => byId[u.id] = u);

    const childrenOf = {};

    users.forEach(u => {

      const p = u.parentId && byId[u.parentId] ? u.parentId : "root";

      (childrenOf[p] = childrenOf[p] || []).push(u);

    });



    function renderNode(u, depth) {

      const kids = childrenOf[u.id] || [];

      return `<div style="margin-left:${depth*22}px" class="py-1.5 flex items-center gap-2">

        <img src="${u.photoURL || placeholderAvatar(u.name)}" class="w-7 h-7 rounded-full object-cover border border-[#D9A441]/50">

        <span class="text-sm">${escapeHtml(u.name)}</span>

        <span class="badge" style="background:${ROLE_COLORS[u.role]}22;color:${ROLE_COLORS[u.role]};border:1px solid ${ROLE_COLORS[u.role]}55">${u.role}</span>

      </div>${kids.map(k => renderNode(k, depth+1)).join("")}`;

    }



    const wrap = document.getElementById("treeWrap");

    if (wrap) {

      const roots = childrenOf["root"] || [];

      wrap.innerHTML = roots.length ? roots.map(r => renderNode(r, 0)).join("") : `<p class="text-[#63769a] text-sm">Bado hakuna muundo wa ukoo uliowekwa.</p>`;

    }

  });

  UNSUBS.push(unsub);



  document.getElementById("parentSaveBtn").onclick = async () => {

    const parentId = document.getElementById("parentSelect").value || null;

    await db.collection("users").doc(CURRENT_USER.uid).update({ parentId });

    PROFILE.parentId = parentId;

    showToast("Nasaba yako imesasishwa.","success");

  };

}

      const u = d.data();

      const isSelf = d.id === CURRENT_USER.uid;

      return `<div class="flex items-center justify-between border-b hairline pb-2 gap-2 flex-wrap">

        <div class="flex items-center gap-3">

          <img src="${u.photoURL || placeholderAvatar(u.name)}" class="w-8 h-8 rounded-full object-cover">

          <div>

            <p class="text-sm font-medium">${escapeHtml(u.name)}</p>

            <p class="text-xs text-[#63769a]">${escapeHtml(u.email)}</p>

          </div>

        </div>

        <div class="flex items-center gap-2">

          <span class="badge" style="background:${ROLE_COLORS[u.role]}22;color:${ROLE_COLORS[u.role]};border:1px solid ${ROLE_COLORS[u.role]}55">${u.role}</span>

          ${canRemove && !isSelf ? `<button data-removeuser="${d.id}" class="text-xs text-[#B4553A] hover:underline">Ondoa</button>` : ""}

        </div>

      </div>`;

    }).join("");

    if (canRemove) {

      list.querySelectorAll("[data-removeuser]").forEach(b => {

        b.onclick = async () => {

          if (!await showConfirm("Una uhakika unataka kumwondoa mwanachama huyu kwenye ukoo? Wasifu wake utafutwa.")) return;

          await db.collection("users").doc(b.dataset.removeuser).delete();

          showToast("Mwanachama ameondolewa. (Akaunti yake ya kuingia haitofutika moja kwa moja kwa sababu za usalama wa Firebase.)","info",5000);

        };

      });

    }

  });

  UNSUBS.push(unsub);

}

   UTIL

function escapeHtml(str) {

  if (!str) return "";

  return String(str)

    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")

    .replaceAll('"',"&quot;").replaceAll("'","&#039;");

}



/* =========================================================

   PICHA: kupunguza ukubwa kabla ya kupakia (haraka zaidi

   kwenye mtandao dhaifu) + kupakia na % + timeout wazi

========================================================= */

function compressImage(file, maxDim = 1600, quality = 0.82) {

  return new Promise((resolve, reject) => {

    if (!file.type || !file.type.startsWith("image/")) { resolve(file); return; }

    const img = new Image();

    const url = URL.createObjectURL(file);

    img.onload = () => {

      URL.revokeObjectURL(url);

      let { width, height } = img;

      if (width > maxDim || height > maxDim) {

        const scale = maxDim / Math.max(width, height);

        width = Math.round(width * scale);

        height = Math.round(height * scale);

      }

      const canvas = document.createElement("canvas");

      canvas.width = width; canvas.height = height;

      canvas.getContext("2d").drawImage(img, 0, 0, width, height);

      canvas.toBlob(blob => resolve(blob || file), "image/jpeg", quality);

    };

    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };

    img.src = url;

  });

}



function uploadWithProgress(ref, blob, onProgress, timeoutMs = 30000) {

  return new Promise((resolve, reject) => {

    const task = ref.put(blob);

    let timer = setTimeout(() => { task.cancel(); reject(new Error("timeout")); }, timeoutMs);

    const resetTimer = () => {

      clearTimeout(timer);

      timer = setTimeout(() => { task.cancel(); reject(new Error("timeout")); }, timeoutMs);

    };

    task.on("state_changed", snap => {

      resetTimer();

      const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);

      onProgress(pct);

    }, err => { clearTimeout(timer); reject(err); },

       () => { clearTimeout(timer); resolve(); });

  });

}
